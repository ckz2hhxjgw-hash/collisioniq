<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CollisionIQ by Lytx</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; }
    .screen { display: none; flex-direction: column; min-height: 100vh; padding-top: 64px; }
    .screen.active { display: flex; }
    .btn-primary { background: #1F4E79; color: white; border-radius: 12px; padding: 16px 24px; font-size: 17px; font-weight: 600; width: 100%; border: none; cursor: pointer; transition: background 0.15s; }
    .btn-primary:active { background: #163a5a; }
    .btn-secondary { background: white; color: #1F4E79; border: 2px solid #1F4E79; border-radius: 12px; padding: 14px 24px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; transition: all 0.15s; }
    .btn-secondary:active { background: #edf4fb; }
    .btn-danger { background: #dc2626; color: white; border-radius: 12px; padding: 16px 24px; font-size: 17px; font-weight: 600; width: 100%; border: none; cursor: pointer; }
    .btn-ghost { background: transparent; color: #6b7280; border: none; padding: 12px 24px; font-size: 15px; cursor: pointer; width: 100%; }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .badge { display: inline-flex; align-items: center; gap: 4px; background: #dbeafe; color: #1e40af; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-red { background: #fee2e2; color: #dc2626; }
    .badge-green { background: #dcfce7; color: #16a34a; }
    .badge-orange { background: #fff7ed; color: #c2410c; }
    .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #1F4E79; border-radius: 2px; transition: width 0.4s ease; }
    .telemetry-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .telemetry-row:last-child { border-bottom: none; }
    .photo-thumb { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0; }
    .photo-check { width: 64px; height: 64px; border-radius: 8px; background: #dcfce7; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid #16a34a; }
    .photo-pending { width: 64px; height: 64px; border-radius: 8px; background: #f8fafc; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px dashed #cbd5e1; }
    input[type="text"], input[type="tel"], select { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; transition: border-color 0.15s; background: white; }
    input[type="text"]:focus, input[type="tel"]:focus, select:focus { border-color: #1F4E79; }
    .spinner { width: 40px; height: 40px; border: 3px solid #dbeafe; border-top-color: #1F4E79; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .safety-btn { background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px 20px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: left; display: flex; align-items: center; gap: 12px; }
    .safety-btn:active { background: #f0f9ff; border-color: #1F4E79; }
    .safety-btn.selected { background: #eff6ff; border-color: #1F4E79; color: #1F4E79; }
    .report-text { background: #f8fafc; border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.7; color: #374151; white-space: pre-wrap; }
  
  
  
  
  </style>
</head>
